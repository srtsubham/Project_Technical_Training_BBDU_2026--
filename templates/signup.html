{% extends 'base.html' %}
{% block title %}Sign Up{% endblock title %}
{% block content %}
<div class="container py-5 h-100">
    <div class="row justify-content-center align-items-center h-100">
        <div class="col-12 col-lg-9 col-xl-7">
            <div class="card bg-panel border-0" style="border-radius: 15px;">
                <div class="card-body p-4 p-md-5">
                    <h3 class="mb-4 pb-2 pb-md-0 mb-md-5 txt-red fw-bold">Registration Form</h3>

                    {% if error %}
                    <div class="alert alert-danger bg-red border-0 text-white">{{ error }}</div>
                    {% endif %}

                    <form method="POST" action="/signup/">
                        {% csrf_token %}
                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <div class="form-outline">
                                    <label class="form-label">First Name</label>
                                    <input type="text" name="firstname" class="form-control form-control-lg" />
                                </div>
                            </div>
                            <div class="col-md-6 mb-4">
                                <div class="form-outline">
                                    <label class="form-label">Last Name</label>
                                    <input type="text" name="lastname" class="form-control form-control-lg" />
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-4 pb-2">
                                <div class="form-outline">
                                    <label class="form-label">Email</label>
                                    <input type="email" name="emailAddress" class="form-control form-control-lg" required />
                                </div>
                            </div>
                            <div class="col-md-6 mb-4 pb-2">
                                <div class="form-outline">
                                    <label class="form-label">Username</label>
                                    <input type="text" name="username" class="form-control form-control-lg" required />
                                </div>
                            </div>
                        </div>

                        <div class="mb-4 pb-2">
                            <div class="form-outline">
                                <label class="form-label">Password</label>
                                <input type="password" name="password" class="form-control form-control-lg" required />
                            </div>
                        </div>

                        <div class="mt-4 pt-2">
                            <button class="btn-3d w-100" type="submit">Submit</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
